name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  backend:
    name: Backend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npm test -- --ci
      - name: Build
        run: npm run build

  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint -- --max-warnings=0
      - name: Tests
        run: npm test
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
